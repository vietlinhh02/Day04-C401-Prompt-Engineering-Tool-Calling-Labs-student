# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Ask the user a question when information is missing or unclear. Use when: the user wants tweets but doesn't specify whose, wants to read an article but provides no URL, or wants to send/publish content (to get confirmation). Always use this before any write action like 'send'."
    parameters:
      type: object
      properties:
        question:
          {
            type: string,
            default: "",
            description: "The question to ask the user",
          }
        response_type:
          {
            type: string,
            enum: [text, yes_no, choice],
            default: "text",
            description: "Expected response format: text for free-form, yes_no for confirmation, choice for multiple options",
          }
        options:
          {
            type: array,
            default: [],
            items: { type: string },
            description: "Available options when response_type is choice",
          }
      required: [question]

  - name: timeline
    description: "Get recent posts from a specific user's social media timeline. Use when the user asks for posts FROM a specific person. Requires the account's screenname/handle."
    parameters:
      type: object
      properties:
        screenname:
          {
            type: string,
            default: "",
            description: "Account handle (e.g. sama, elonmusk, karpathy)",
          }
        limit:
          {
            type: integer,
            default: 5,
            description: "Number of posts to retrieve",
          }
      required: [screenname]

  - name: social_search
    description: "Search social media posts by topic or keyword. Use when the user wants to find posts ABOUT a topic (not from a specific person)."
    parameters:
      type: object
      properties:
        query: { type: string, default: "", description: "Search keywords" }
        search_type:
          {
            type: string,
            enum: [Latest, Top],
            default: "Latest",
            description: "Latest for recent posts, Top for most popular",
          }
        limit: { type: integer, default: 5, description: "Number of results" }
      required: [query]

  - name: lookup
    description: "Search the web for information, news, and current events. Use for general knowledge questions and news lookups. Automatically prioritizes Vietnamese news sites (VnExpress, Dân Trí, Tuổi Trẻ, Vietnamnet, etc.) when searching for Vietnamese news."
    parameters:
      type: object
      properties:
        query:
          {
            type: string,
            default: "",
            description: "Search query (keep concise, use user's keywords)",
          }
        topic:
          {
            type: string,
            enum: [general, news],
            default: "general",
            description: "general for broad search, news for recent news articles",
          }
        timeframe:
          {
            type: string,
            enum: [day, week, month, year],
            default: "week",
            description: "Time range: day for today, week for this week",
          }
        max_results:
          {
            type: integer,
            default: 10,
            description: "Number of results to return",
          }
      required: [query]

  - name: fetch
    description: "Read and extract content from a specific URL. Use when the user provides a direct link to an article or webpage."
    parameters:
      type: object
      properties:
        url: { type: string, default: "", description: "The full URL to read" }
      required: [url]

  - name: format
    description: "Format collected items into a structured digest. Use after gathering information to present it nicely to the user."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "List of items to format"
          items:
            type: object
            properties:
              title: { type: string }
              url: { type: string }
              source: { type: string }
              summary: { type: string }
              section: { type: string }
        template:
          {
            type: string,
            enum: [brief, sections, bullets, thread, daily_ai_vn],
            default: "sections",
            description: "Output format template",
          }
        headline:
          {
            type: string,
            default: "",
            description: "Main headline for the digest",
          }
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Send content to a Telegram channel. IMPORTANT: Only call this with confirmed=true AFTER the user has explicitly confirmed. Always use 'clarify' with response_type=yes_no first to ask for confirmation."
    parameters:
      type: object
      properties:
        text: { type: string, default: "", description: "Content to send" }
        confirmed:
          {
            type: boolean,
            default: false,
            description: "Must be true to actually send. Only set true after user confirms via clarify.",
          }
      required: [text]

  - name: policy
    description: "Search company policy documents. Use when the user asks about internal rules, guidelines, or policies."
    parameters:
      type: object
      properties:
        query:
          {
            type: string,
            default: "",
            description: "Policy topic or keyword to search",
          }
        policy_area:
          {
            type: string,
            enum:
              [
                all,
                ai_research,
                source_citation,
                data_privacy,
                external_publishing,
                tool_usage,
              ],
            default: "all",
            description: "Filter by policy category",
          }
        top_k: { type: integer, default: 3, description: "Number of results" }
      required: [query]

  - name: papers
    description: "Search for academic papers on arXiv. Use when the user wants to find scientific papers or research."
    parameters:
      type: object
      properties:
        query:
          {
            type: string,
            default: "",
            description: "Research topic or keywords",
          }
        max_results:
          {
            type: integer,
            default: 5,
            description: "Number of papers to return",
          }
        sort_by:
          {
            type: string,
            enum: [relevance, lastUpdatedDate, submittedDate],
            default: "relevance",
            description: "Sort order",
          }
      required: [query]

  - name: paper_text
    description: "Extract text content from an arXiv paper PDF. Use after finding a paper with 'papers' tool to read its content."
    parameters:
      type: object
      properties:
        arxiv_url:
          {
            type: string,
            default: "",
            description: "arXiv paper ID or full URL",
          }
        max_pages:
          { type: integer, default: 5, description: "Maximum pages to extract" }
        max_chars:
          {
            type: integer,
            default: 8000,
            description: "Maximum characters to return",
          }
      required: [arxiv_url]

  - name: calculator
    description: "Safely evaluate mathematical expressions. Use when the user asks to solve a math problem, calculate basic arithmetic, or evaluate formulas locally."
    parameters:
      type: object
      properties:
        expression:
          {
            type: string,
            default: "",
            description: "The mathematical expression to evaluate (e.g. '2 + 2', '15 * 3 - 4', '2 ** 8')",
          }
      required: [expression]

  - name: rss
    description: "Fetch and parse an RSS/Atom feed from a URL. Use when the user wants to monitor a specific blog, news site, or podcast that provides an RSS feed."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "RSS feed URL to fetch"}
        max_items: {type: integer, default: 10, description: "Maximum number of items to return"}
      required: [url]

  - name: reddit
    description: "Search Reddit posts and comments. Use when the user wants to find discussions, opinions, or community content from Reddit."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Search keywords or phrase"}
        max_results: {type: integer, default: 10, description: "Maximum number of results to return"}
        sort: {type: string, enum: [relevance, top, new, hot], default: "relevance", description: "Sort order"}
        timeframe: {type: string, enum: [all, year, month, week, day, hour], default: "all", description: "Time range to search"}
        content_type: {type: string, enum: [posts, comments, both], default: "posts", description: "What to search: posts, comments, or both"}
      required: [query]

  - name: summarize
    description: "Summarize long text by extracting the most important sentences. Use when the user wants a shorter version of an article or document."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Text to summarize"}
        max_sentences: {type: integer, default: 5, description: "Maximum number of sentences in summary (1-10)"}
      required: [text]

  - name: translate
    description: "Translate text between languages. Use when the user wants to translate content. Supports common language codes: en, vi, ja, ko, zh, fr, de, es."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Text to translate (max 500 chars)"}
        source_lang: {type: string, default: "auto", description: "Source language code (auto for auto-detect)"}
        target_lang: {type: string, default: "en", description: "Target language code (e.g. en, vi, ja, ko)"}
      required: [text, target_lang]

  - name: sentiment
    description: "Analyze sentiment of text. Returns sentiment (positive/negative/neutral), confidence score, and matched positive/negative words. Works for English and Vietnamese."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Text to analyze"}
      required: [text]
