# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
# starter_v0 — tool declarations (Production-Ready)
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: >
      BẮT BUỘC GỌI CÔNG CỤ NÀY TRONG 2 TRƯỜNG HỢP: 
      1. Người dùng yêu cầu tra cứu nhưng THIẾU thông tin sống còn (thiếu đường link URL, hoặc thiếu tên tài khoản cụ thể). 
      2. Yêu cầu xác nhận (response_type="yes_no") TRƯỚC KHI thực hiện hành động đăng tải, gửi đi (send/publish).
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi làm rõ thông tin hoặc xin phép."}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: >
      Lấy bài đăng (tweets) của MỘT TÀI KHOẢN (người nổi tiếng, cá nhân) cụ thể. 
      CHỈ DÙNG khi người dùng đã cung cấp đích danh tên tài khoản. Nếu thiếu tên, TUYỆT ĐỐI KHÔNG đoán mò mà phải gọi 'clarify'.
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản mạng xã hội hoặc handle (ví dụ: sama, elonmusk)."}
        limit: {type: integer, default: 5, description: "Số lượng bài đăng cần lấy."}
      required: [screenname]

  - name: social_search
    description: >
      Tìm kiếm bài đăng trên mạng xã hội theo CHỦ ĐỀ. 
      Lưu ý ánh xạ tham số: 'phổ biến', 'top' -> search_type='Top'.
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa chủ đề cần tìm trên mạng xã hội."}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp kết quả."}
        limit: {type: integer, default: 5, description: "Số lượng bài đăng."}
      required: [query]

  - name: lookup
    description: >
      Tra cứu thông tin, tin tức báo chí thời sự hoặc kiến thức chung trên Internet. KHÔNG DÙNG cho mạng xã hội. 
      Lưu ý ánh xạ: Tin thời sự -> topic='news'. 'Hôm nay' -> timeframe='day', 'tuần này' -> timeframe='week', 'tháng này' -> timeframe='month'.
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn gốc của người dùng, KHÔNG TỰ Ý thêm các từ như 'news', 'today'."}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại nội dung."}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian tra cứu."}
        max_results: {type: integer, default: 5, description: "Số kết quả."}
      required: [query]

  - name: fetch
    description: >
      Đọc, tóm tắt và trích xuất nội dung từ MỘT ĐỊA CHỈ LINK (URL) CỤ THỂ do người dùng cung cấp. 
      Nếu người dùng nhắc đến 'bài viết này' nhưng chưa đưa link, phải gọi 'clarify'.
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ URL đầy đủ cần đọc."}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: >
      Gửi, đăng tải hoặc xuất bản văn bản đi. 
      TUYỆT ĐỐI KHÔNG GỌI CÔNG CỤ NÀY NẾU CHƯA GỌI 'clarify' ĐỂ XIN XÁC NHẬN TỪ NGƯỜI DÙNG TRƯỚC. Chỉ dùng để trả lời trực tiếp mà không cần gửi nếu câu hỏi nằm ngoài phạm vi.
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung cần gửi."}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận. Phải bằng true nếu đã xin phép người dùng."}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]

  